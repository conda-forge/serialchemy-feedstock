{% set name = "serialchemy" %}
{% set version = "1.0.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 344c0f54cf6962dac00e87c380e40d608d38610b82909e9c1237e0148874ec1c

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - sqlalchemy >=1.4, <2.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - serialchemy
    - serialchemy._tests

about:
  home: http://github.com/ESSS/serialchemy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Serializers for SQLAlchemy models.
  doc_url: https://serialchemy.readthedocs.io/
  dev_url: http://github.com/ESSS/serialchemy

extra:
  recipe-maintainers:
    - lincrosenbach
    - kfasolin
    - nicoddemus
    - lvoliveira
